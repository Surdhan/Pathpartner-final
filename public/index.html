<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />

    <!-- Open Graph Meta Tags for social media -->
    <meta property="og:title" content="Pathfinder App">
    <meta property="og:description" content="Your app description here">
    <meta property="og:image" content="path-to-image.jpg">
    <meta property="og:url" content="https://yourwebsite.com">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@yourTwitterHandle">
    <meta name="twitter:title" content="Pathfinder App">
    <meta name="twitter:description" content="Your app description here">

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Pathfinder</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Load Google Maps API securely with environment variable -->
    <script
      src={`https://maps.googleapis.com/maps/api/js?key=${process.env.REACT_APP_GOOGLE_MAPS_API_KEY}`}
      async
      defer
      onload="initializeMap()"
    ></script>
  </body>
</html>
